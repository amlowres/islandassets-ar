<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>View in AR</title>

<!-- model-viewer library -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>

<style>
  :root {
    --bg: #0e0e0f;
    --fg: #f2f2f0;
    --accent: #6ee7b7;
    --muted: #8a8a8f;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 24px;
    text-align: center;
  }

  h1 {
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.01em;
    margin: 0 0 20px;
    color: var(--muted);
  }

  model-viewer {
    width: 100%;
    max-width: 480px;
    height: 60vh;
    max-height: 480px;
    background: #1a1a1c;
    border-radius: 16px;
    --poster-color: transparent;
  }

  /* Big, obvious "View in AR" button */
  #ar-button {
    margin-top: 24px;
    padding: 16px 32px;
    font-size: 1rem;
    font-weight: 600;
    color: #0e0e0f;
    background: var(--accent);
    border: none;
    border-radius: 999px;
    cursor: pointer;
    transition: transform 0.15s ease, opacity 0.15s ease;
  }

  #ar-button:hover { transform: scale(1.03); }
  #ar-button:active { transform: scale(0.97); }

  #ar-button:not([slot]) { display: none; } /* safety fallback, unused */

  .hint {
    margin-top: 14px;
    font-size: 0.8rem;
    color: var(--muted);
  }
</style>
</head>
<body>

  <h1>Tap below to place this object in your space</h1>

  <model-viewer
    id="viewer"
    src="https://freight.cargo.site/m/Y3026693593296494290467170683274/Adirondack-chairs.glb"
    alt="3D model preview"
    ar
    ar-modes="webxr scene-viewer quick-look"
    camera-controls
    auto-rotate
    shadow-intensity="1"
  >
    <button id="ar-button" slot="ar-button">View in AR</button>
  </model-viewer>

  <p class="hint">Works best on a phone with AR support (iOS Quick Look or Android Scene Viewer).</p>

</body>
</html>
